{% extends "base.html" %}
{% block title %}Вход — ЖКХ Панель{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">🏠 ЖКХ Панель</h1>
        
        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            Неверный пароль
        </div>
        {% endif %}
        
        <form method="post" action="/login">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">
                    Вход как:
                </label>
                <div class="space-y-3">
                    <label class="flex items-center">
                        <input 
                            type="radio" 
                            name="role" 
                            value="admin"
                            {% if role == 'admin' %}checked{% endif %}
                            class="mr-2"
                        >
                        <span class="text-gray-700">👨‍💼 Администратор</span>
                    </label>
                    <label class="flex items-center">
                        <input 
                            type="radio" 
                            name="role" 
                            value="employee"
                            {% if role == 'employee' %}checked{% endif %}
                            class="mr-2"
                        >
                        <span class="text-gray-700">👷 Сотрудник</span>
                    </label>
                </div>
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
                    Пароль
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                    placeholder="Введите пароль"
                    required
                    autofocus
                >
            </div>
            <button 
                type="submit" 
                class="w-full bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
            >
                Войти
            </button>
        </form>
    </div>
</div>
{% endblock %}
